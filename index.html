<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VETIAS Document & Certificates Management | Pro</title>
<style>
    /* --- Keyframe Animations --- */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
        0%, 100% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
        50% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.7); }
    }
    @keyframes shakeError {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    @keyframes popInSuccess {
        0% { opacity: 0; transform: scale(0.8); }
        80% { opacity: 1; transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* 1. Global & Typography: Black Base */
    body { 
        font-family: 'Inter', sans-serif;
        background: #121212; 
        margin: 0; 
        color: #e0e0e0; 
        transition: background 0.3s;
    }
    
    /* 2. Header & Branding */
    header { 
        background: linear-gradient(90deg, #1c1c1c, #121212); 
        color: white; 
        text-align: center; 
        padding: 40px 15px 20px 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        animation: fadeInUp 0.8s ease-out forwards;
    }
    header h2 {
        margin: 0 0 5px 0;
        font-size: 2.2em;
        font-weight: 700;
        letter-spacing: 1px;
        color: #D4AF37; 
        animation: pulseGlow 3s infinite ease-in-out;
    }
    header p {
        font-size: 1em;
        opacity: 0.6;
        margin-top: 10px;
    }

    /* 3. Main Card & Layout */
    .container { 
        padding: 40px 20px 20px 20px;
        text-align: center; 
    }
    section { 
        display: block; 
        background: #1e1e1e; 
        margin: 0 auto 30px auto; 
        padding: 40px; 
        border-radius: 16px; 
        max-width: 480px; 
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5); 
        border-top: 3px solid #D4AF37; 
        border: 1px solid #333;
        text-align: left;
        opacity: 0; 
        animation: fadeInUp 0.8s ease-out 0.2s forwards; 
    }
    section h3 {
        color: #D4AF37; 
        margin-top: 0;
        margin-bottom: 30px;
        font-weight: 500;
        border-bottom: 1px solid #D4AF37;
        padding-bottom: 15px;
        letter-spacing: 0.5px;
    }

    /* 4. Input Fields & Labels */
    .form-group {
        position: relative;
        margin-bottom: 25px;
    }
    
    .form-input {
        width: 100%; 
        box-sizing: border-box; 
        padding: 14px 12px 10px 12px; 
        background: #2b2b2b; 
        border: 1px solid #444; 
        border-radius: 8px; 
        color: #f0f0f0;
        transition: border-color 0.3s, box-shadow 0.3s;
        font-size: 1em;
    }
    
    .form-label {
        position: absolute;
        top: 14px;
        left: 12px;
        font-size: 1em;
        color: #b0b0b0;
        pointer-events: none;
        transition: all 0.2s ease-out;
    }

    /* Adjust label positioning if text is long */
    .form-input:focus + .form-label,
    .form-input:not(:placeholder-shown) + .form-label {
        top: 6px;
        font-size: 0.75em;
        color: #D4AF37;
        /* Handle potential overflow on smaller screens */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        width: calc(100% - 24px); 
    }

    .form-input:focus {
        border-color: #D4AF37; 
        box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        outline: none;
    }

    label[for="fileInput"] {
        display: block;
        text-align: left;
        margin-bottom: 5px;
        font-size: 0.9em;
        color: #b0b0b0;
    }
    input[type="file"] {
        width: 100%; 
        box-sizing: border-box; 
        padding: 12px; 
        background: #2b2b2b; 
        border: 1px solid #444; 
        border-radius: 8px; 
        color: #f0f0f0;
        font-size: 1em;
    }
    input[type="file"]::file-selector-button {
        background: #D4AF37;
        color: #121212; 
        border: none;
        padding: 8px 12px;
        margin-right: 10px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
    }
    input[type="file"]::file-selector-button:hover {
        background: #E6B800;
    }
    
    /* 5. Button Styles */
    button[type="submit"] {
        width: 100%;
        padding: 15px;
        background: linear-gradient(90deg, #D4AF37, #B8860B); 
        border: none;
        color: #121212; 
        font-size: 1.1em;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
        font-weight: 700;
        margin-top: 15px;
        letter-spacing: 0.5px;
        position: relative; 
        text-align: center;
        text-decoration: none;
        box-sizing: border-box;
        display: inline-block;
    }
    button[type="submit"]:hover { 
        background: linear-gradient(90deg, #E6B800, #D4AF37);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }
    
    /* Button Loader */
    .loader {
        width: 18px;
        height: 18px;
        border: 3px solid #121212;
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: spin 1s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
    }
    button.loading {
        color: transparent; 
        cursor: not-allowed;
    }
    button.loading::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        border: 4px solid transparent;
        border-top-color: #121212;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }


    /* 6. Message/Alert Styles */
    #message { 
        margin-top: 30px; 
        padding: 15px; 
        font-weight: 600; 
        border-radius: 8px; 
        border-left: 5px solid;
        min-height: 20px; 
        visibility: hidden; 
        opacity: 0;
        transition: visibility 0s, opacity 0.5s linear;
        text-align: left;
    }
    #message.show { 
        visibility: visible; 
        opacity: 1; 
    }
    .info { background: #333; color: #D4AF37; border-color: #D4AF37; }
    .success.show { 
        background: #3a321a; color: #E6B800; border-color: #D4AF37; 
        animation: popInSuccess 0.3s ease-out forwards;
    }
    .error.show { 
        background: #4a3333; color: #ff6347; border-color: #d32f2f;
        animation: shakeError 0.4s ease-in-out forwards;
    }

    /* 7. Footer Styles */
    footer {
        text-align: center;
        padding: 20px;
        font-size: 0.85em;
        color: #D4AF37; 
        margin-top: 40px;
        opacity: 0; 
        transition: opacity 2s ease-in;
        line-height: 1.8;
    }
    footer.visible {
        opacity: 1;
    }
    .team-list {
        display: block;
        color: #b0b0b0; 
        margin-bottom: 5px;
        font-size: 0.9em;
    }
    .name-separator {
        color: #444; 
        margin: 0 6px;
    }
    
</style>
<!-- Load Google Font 'Inter' -->
<link rel="preconnect" href="https.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h2>VETIAS DOCUMENT & CERTIFICATES MANAGEMENT SYSTEM</h2>
    <p>FINAL YEAR PROJECT | Secure, Safe & Easy to Use</p>
</header>

<div class="container">
    
    <section id="upload">
        <h3>Document or Certificate Upload Interface</h3>
        
        <form id="uploadForm" action="/api/upload-certificate" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <input type="text" id="studentName" name="student_name" class="form-input" placeholder=" " required>
                <!-- UPDATED: Added example text to the label -->
                <label for="studentName" class="form-label">Student Name (e.g., Kishore S)</label>
            </div>

            <div class="form-group">
                <input type="text" id="certificateName" name="certificate_name" class="form-input" placeholder=" " required>
                <label for="certificateName" class="form-label">Certificate Name (e.g., Java Basics)</label>
            </div>
            
            <div class="form-group">
                <input type="text" id="rollNumber" name="roll_number" class="form-input" placeholder=" " required>
                <!-- UPDATED: Added example text to the label -->
                <label for="rollNumber" class="form-label">Roll Number (e.g., 24CSC16)</label>
            </div>
            
            <label for="fileInput">Select Certificate File (.pdf, .jpg, .png)</label>
            <input type="file" id="fileInput" name="certificate_file" accept=".pdf,.jpg,.png" required style="margin-top: 5px;">
            
            <button type="submit">Upload Document</button>
        </form>
        <div id="message"></div>
    </section>
    
</div>

<footer id="footer">
    <!-- CORRECTED FOOTER FORMATTING -->
    
    </span>
    <br>
    <strong>FINAL YEAR PROJECT</strong> | Developed and maintained by the <strong> KISHORE S</strong>
</footer>

<script>
    
    // --- Upload Form Logic ---
    document.getElementById('uploadForm').addEventListener('submit', async function(event) {
        event.preventDefault(); 
        
        const form = event.target;
        const formData = new FormData(form);
        const messageDiv = document.getElementById('message');
        const submitButton = form.querySelector('button[type="submit"]');
        const originalButtonText = submitButton.innerHTML; 
        
        submitButton.disabled = true;
        submitButton.classList.add('loading');
        submitButton.innerHTML = ''; 
        
        messageDiv.className = 'info show'; 
        messageDiv.textContent = 'Processing request... Please wait.';

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData
            });

            const result = await response.text();

            if (response.ok) {
                messageDiv.className = 'success show'; 
                messageDiv.textContent = '✅ ' + result;
            } else {
                messageDiv.className = 'error show'; 
                messageDiv.textContent = '❌ Upload Failed: ' + result;
            }
        } catch (error) {
            messageDiv.className = 'error show'; 
            messageDiv.textContent = '❌ Network Error: Could not reach the server (Is node server running?).';
        } finally {
            submitButton.disabled = false;
            submitButton.classList.remove('loading');
            submitButton.innerHTML = originalButtonText; 
        }
    });

    // --- Page Load Logic ---
    document.addEventListener('DOMContentLoaded', (event) => {
        // Show the upload section by default
        document.getElementById('upload').style.display = 'block';
        
        // Start footer fade-in
        setTimeout(() => {
            const footer = document.getElementById('footer');
            if (footer) {
                footer.classList.add('visible');
            }
        }, 2000); 
    });
</script>

</body>
</html>
