<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETIAS Document & Certificates Management System</title>
    <style>
        /* --- Core Keyframe Animations --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        @keyframes popInSuccess {
            0% { opacity: 0; transform: scale(0.8); }
            80% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Global Base Dark Configuration */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Fixed Top Branding Layout */
        header {
            text-align: center;
            padding: 40px 20px 10px 20px;
            width: 100%;
            box-sizing: border-box;
            animation: fadeInUp 0.8s ease-out forwards;
        }
        header h1 {
            color: #e6b800;
            font-size: 2.2rem;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 12px rgba(230, 184, 0, 0.6);
            font-weight: 800;
        }
        header p {
            color: #8c8c8c;
            font-size: 1rem;
            margin: 0;
        }

        /* Main Central Interface Component Wrapper Card */
        .container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .section-box {
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-top: 3px solid #e6b800;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            box-sizing: border-box;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        .section-title {
            color: #e6b800;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(230, 184, 0, 0.5);
            letter-spacing: 0.5px;
        }
        
        .divider {
            border: none;
            border-top: 1px solid #444444;
            margin-bottom: 25px;
        }

        /* Input Control Group Components Styling */
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: #b0b0b0;
            margin-bottom: 8px;
            text-align: left;
        }
        .form-group select, 
        .form-group input[type="text"],
        .file-upload-wrapper {
            width: 100%;
            padding: 14px;
            background-color: #262626;
            border: 1px solid #444444;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        /* Focus Light Border Yellow Neon Glow Interaction mapping */
        .form-group select:focus, 
        .form-group input[type="text"]:focus {
            border-color: #e6b800;
            box-shadow: 0 0 10px rgba(230, 184, 0, 0.4);
        }

        /* Customized Responsive File Selection Wrapper Field */
        .file-upload-wrapper {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .file-upload-wrapper:hover {
            border-color: #e6b800;
            box-shadow: 0 0 10px rgba(230, 184, 0, 0.3);
        }
        .file-btn {
            background-color: #e6b800;
            color: #0d0d0d;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-right: 15px;
            white-space: nowrap;
        }
        .file-name-text {
            color: #8c8c8c;
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Refixed Horizontal Metallic Gold Button layout without dark fades */
        .btn-gold {
            background: linear-gradient(to right, #fff5b3 0%, #ffcc00 50%, #e6a100 100%);
            color: #0d0d0d;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(230, 184, 0, 0.3);
            letter-spacing: 0.7px;
            text-transform: uppercase;
            outline: none;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            text-align: center;
        }
        .btn-gold:hover {
            box-shadow: 0 6px 20px rgba(230, 184, 0, 0.5);
            transform: translateY(-2px);
        }
        .btn-gold:active {
            transform: scale(0.97);
            background: linear-gradient(to right, #ffffff 0%, #fff2a3 60%, #ffcc00 100%);
            box-shadow: 0 0 25px #e6b800, inset 0 0 10px rgba(255, 255, 255, 0.5);
        }
        /* Button Loading state adjustments mappings */
        .btn-gold.loading {
            color: transparent;
            cursor: not-allowed;
            position: relative;
        }
        .btn-gold.loading::after {
            content: "";
            position: absolute;
            width: 20px; height: 20px;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
            border: 3px solid transparent;
            border-top-color: #0d0d0d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Dynamic Real Response Message Status Styling */
        #api-response-msg {
            margin-top: 25px;
            padding: 15px;
            font-weight: 600;
            border-radius: 8px;
            border-left: 5px solid;
            display: none;
            text-align: left;
        }
        #api-response-msg.info { background: #1c1c1c; color: #e6b800; border-color: #e6b800; display: block; }
        #api-response-msg.success { 
            background: #23311f; color: #5cd65c; border-color: #2e7d32; display: block;
            animation: popInSuccess 0.3s ease-out forwards;
        }
        #api-response-msg.error { 
            background: #382424; color: #ff6347; border-color: #d32f2f; display: block;
            animation: shakeError 0.4s ease-in-out forwards;
        }

        /* Footer Custom Professional Portfolio view layout */
        footer {
            text-align: center;
            padding: 25px;
            color: #777777;
            font-size: 0.95rem;
            margin-top: auto;
            width: 100%;
            letter-spacing: 0.5px;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }
        footer.visible { opacity: 1; }
        footer span {
            color: #e6b800;
            font-weight: 700;
            text-shadow: 0 0 12px rgba(230, 184, 0, 0.5);
        }
        footer .dept-label {
            display: block;
            font-size: 0.85rem;
            color: #555555;
            font-weight: 500;
            margin-top: 2px;
        }

        .hidden { display: none !important; }

        /* Mobile View Auto-scale Configuration Settings */
        @media (max-width: 600px) {
            header { padding: 25px 15px 5px 15px; }
            header h1 { font-size: 1.5rem; }
            header p { font-size: 0.85rem; }
            .section-box { padding: 25px 20px; }
            .section-title { font-size: 1.2rem; }
            footer { font-size: 0.85rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>VETIAS DOCUMENT & CERTIFICATES MANAGEMENT SYSTEM</h1>
        <p>FINAL YEAR PROJECT | Secure, Safe & Easy to Use</p>
    </header>

    <div class="container">

        <section id="step1-box" class="section-box">
            <h3 class="section-title">Programme & Semester Configuration</h3>
            <hr class="divider">
            
            <div class="form-group">
                <label>Select Programme / Course</label>
                <select id="dept-select">
                    <option value="">-- Choose Programme / Course --</option>
                    <option value="B.Sc. Computer Science">B.Sc. Computer Science</option>
                    <option value="B.Sc. Computer Science & Applications">B.Sc. Computer Science & Applications</option>
                    <option value="B.Sc. Computer Science (AI & Data Science)">B.Sc. Computer Science (AI & Data Science)</option>
                    <option value="B.Sc. Information Technology">B.Sc. Information Technology</option>
                    <option value="B.C.A.">B.C.A.</option>
                    <option value="B.Com.">B.Com.</option>
                    <option value="BBA">BBA</option>
                    <option value="B.A. English Literature">B.A. English Literature</option>
                    <option value="B.Sc. Costume Design and Fashion">B.Sc. Costume Design and Fashion</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Current Academic Year</label>
                <select id="year-select">
                    <option value="">-- Choose Academic Year --</option>
                    <option value="I Year">I Year</option>
                    <option value="II Year">II Year</option>
                    <option value="III Year">III Year</option>
                </select>
            </div>

            <button type="button" class="btn-gold" onclick="verifyAndGoToStep2()">Next Setup Interface</button>
        </section>

        <section id="step2-box" class="section-box hidden">
            <h3 class="section-title">Document or Certificate Upload Interface</h3>
            <p id="badge-info" style="color: #e6b800; font-size: 0.9rem; margin-top: -5px; margin-bottom: 15px; font-weight: 700; text-shadow: 0 0 5px rgba(230, 184, 0, 0.2);"></p>
            <hr class="divider">

            <form id="uploadForm" action="/api/upload-certificate" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <input type="text" id="studentName" name="student_name" placeholder="Student Name (e.g., Kishore S)" maxlength="40" required>
                </div>

                <div class="form-group">
                    <input type="text" id="certificateName" name="certificate_name" placeholder="Certificate Name (e.g., Java Basics)" maxlength="50" required>
                </div>

                <div class="form-group">
                    <input type="text" id="rollNumber" name="roll_number" placeholder="Roll Number (e.g., 24CSC16)" 
                           oninput="this.value = this.value.toUpperCase()" 
                           pattern="[0-9]{2}[A-Z0-9]+" 
                           title="Please enter a valid format (e.g., 24CSC16)" 
                           maxlength="15" required>
                </div>

                <div class="form-group">
                    <label style="color: #8c8c8c; font-size: 0.85rem;">Select Certificate File (.pdf, .jpg, .png)</label>
                    <input type="file" id="fileInput" name="certificate_file" accept=".pdf,.jpg,.png" style="display: none;" onchange="syncFileLabelText()">
                    <div class="file-upload-wrapper" id="custom-file-container" onclick="openFilePickerWindow()">
                        <span class="file-btn">Choose file</span>
                        <span id="file-custom-text" class="file-name-text">No file chosen</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-gold">Upload Document</button>
            </form>
            
            <div id="api-response-msg"></div>
        </section>

    </div>

    <footer id="footer">
        Maintained & Designed by: <span>KISHORE S</span>
        <span class="dept-label">III B.Sc. Computer Science</span>
    </footer>

    <script>
        // Check selection rules for Step 1 parameters
        function verifyAndGoToStep2() {
            var selectedDept = document.getElementById("dept-select").value;
            var selectedYear = document.getElementById("year-select").value;

            if (!selectedDept) {
                alert("Validation Error: Please select a valid Programme / Course before proceeding!");
                document.getElementById("dept-select").focus();
                return;
            }
            if (!selectedYear) {
                alert("Validation Error: Please select your Academic Year before proceeding!");
                document.getElementById("year-select").focus();
                return;
            }

            document.getElementById("badge-info").innerText = "Target Path: " + selectedDept + " | " + selectedYear;

            document.getElementById("step1-box").classList.add("hidden");
            document.getElementById("step2-box").classList.remove("hidden");
        }

        function openFilePickerWindow() {
            document.getElementById("fileInput").click();
        }

        function syncFileLabelText() {
            var fileSelectorInput = document.getElementById("fileInput");
            var textLabelDisplay = document.getElementById("file-custom-text");
            
            if (fileSelectorInput.files.length > 0) {
                textLabelDisplay.innerText = fileSelectorInput.files[0].name;
                textLabelDisplay.style.color = "#ffffff";
            } else {
                textLabelDisplay.innerText = "No file chosen";
                textLabelDisplay.style.color = "#8c8c8c";
            }
        }

        // --- REAL LIVE SERVER BACKEND NETWORK PIPELINE ---
        document.getElementById('uploadForm').addEventListener('submit', async function(event) {
            var fileField = document.getElementById("fileInput");

            // Stop logic if file selector is completely hollow
            if (fileField.files.length === 0) {
                event.preventDefault();
                alert("Validation Error: Please select a valid Certificate File before uploading!");
                document.getElementById("custom-file-container").style.borderColor = "#ff3333";
                return;
            }

            event.preventDefault(); // Control stream interception
            document.getElementById("custom-file-container").style.borderColor = "#444444";
            
            const formElement = event.target;
            const binaryMultipartData = new FormData(formElement);
            const statusBoxDisplay = document.getElementById('api-response-msg');
            const masterUploadButton = document.getElementById('submitBtn');
            const cacheOriginalText = masterUploadButton.innerHTML;
            
            // Activate dynamic processing spinner style triggers
            masterUploadButton.disabled = true;
            masterUploadButton.classList.add('loading');
            masterUploadButton.innerHTML = ''; 
            
            statusBoxDisplay.className = 'info'; 
            statusBoxDisplay.textContent = 'Processing request secure upload... Please wait.';

            try {
                // Real live database transmission transaction link
                const serverConnectionNetworkStream = await fetch(formElement.action, {
                    method: 'POST',
                    body: binaryMultipartData
                });

                const rawServerOutputText = await serverConnectionNetworkStream.text();

                if (serverConnectionNetworkStream.ok) {
                    statusBoxDisplay.className = 'success'; 
                    statusBoxDisplay.textContent = '✅ Success: ' + rawServerOutputText;
                    
                    // Clear inputs variables after complete cloud push transaction
                    setTimeout(function() {
                        formElement.reset();
                        document.getElementById("file-custom-text").innerText = "No file chosen";
                        document.getElementById("file-custom-text").style.color = "#8c8c8c";
                        statusBoxDisplay.style.display = "none";
                        
                        // Dynamic routing engine returns loop pointer back to configuration panel
                        document.getElementById("step2-box").classList.add("hidden");
                        document.getElementById("step1-box").classList.remove("hidden");
                    }, 3500);

                } else {
                    statusBoxDisplay.className = 'error'; 
                    statusBoxDisplay.textContent = '❌ Upload Failed: ' + rawServerOutputText;
                }
            } catch (networkError) {
                statusBoxDisplay.className = 'error'; 
                statusBoxDisplay.textContent = '❌ Network Error: Could not reach cloud server endpoints (Is backend running?).';
            } finally {
                // Release operational states links
                masterUploadButton.disabled = false;
                masterUploadButton.classList.remove('loading');
                masterUploadButton.innerHTML = cacheOriginalText; 
            }
        });

        // Trigger portfolio footer sequence on standard view load mappings
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const footerBlock = document.getElementById('footer');
                if (footerBlock) { footerBlock.classList.add('visible'); }
            }, 500); 
        });
    </script>
</body>
</html>
