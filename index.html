<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETIAS Document & Certificates Management System</title>
    <style>
        /* --- Core Keyframe Animations --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        @keyframes popInSuccess {
            0% { opacity: 0; transform: scale(0.8); }
            80% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes popUp { to { transform: scale(1); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Global Base Dark Configuration */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Fixed Top Branding Layout */
        header {
            text-align: center;
            padding: 40px 20px 10px 20px;
            width: 100%;
            box-sizing: border-box;
            animation: fadeInUp 0.8s ease-out forwards;
        }
        header h1 {
            color: #e6b800;
            font-size: 2.2rem;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 12px rgba(230, 184, 0, 0.6);
            font-weight: 800;
        }
        header p { color: #8c8c8c; font-size: 1rem; margin: 0; }

        /* Main Central Interface Component Wrapper Card */
        .container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .section-box {
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-top: 3px solid #e6b800;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            box-sizing: border-box;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        .section-title {
            color: #e6b800;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(230, 184, 0, 0.5);
            letter-spacing: 0.5px;
        }
        
        .divider { border: none; border-top: 1px solid #444444; margin-bottom: 25px; }

        /* Input Control Group Components Styling */
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.9rem; color: #b0b0b0; margin-bottom: 8px; text-align: left; }
        
        .form-group select, 
        .form-group input[type="text"],
        .file-upload-wrapper {
            width: 100%;
            padding: 14px;
            background-color: #262626;
            border: 1px solid #444444;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            /* Added smooth background transitions controller speed */
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Focus Light Full Box Glow Background effect mapping */
        .form-group select:focus, 
        .form-group input[type="text"]:focus {
            border-color: #e6b800;
            background-color: #211f18; /* Semma soft-gold tint on focus layer */
            box-shadow: 0 0 10px rgba(230, 184, 0, 0.4);
        }

        /* Customized Responsive File Selection Wrapper Field */
        .file-upload-wrapper { display: flex; align-items: center; cursor: pointer; }
        .file-upload-wrapper:hover { border-color: #e6b800; box-shadow: 0 0 10px rgba(230, 184, 0, 0.3); }
        .file-btn {
            background-color: #e6b800; color: #0d0d0d; padding: 8px 14px;
            border-radius: 6px; font-weight: bold; font-size: 0.85rem; margin-right: 15px; white-space: nowrap;
        }
        .file-name-text { color: #8c8c8c; font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Refixed Horizontal Metallic Gold Button layout */
        .btn-gold {
            background: linear-gradient(to right, #fff5b3 0%, #ffcc00 50%, #e6a100 100%);
            color: #0d0d0d; border: none; padding: 15px; width: 100%; border-radius: 8px;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 15px rgba(230, 184, 0, 0.3); letter-spacing: 0.7px;
            text-transform: uppercase; outline: none; transition: transform 0.1s ease, box-shadow 0.2s ease; text-align: center;
        }
        .btn-gold:hover { box-shadow: 0 6px 20px rgba(230, 184, 0, 0.5); transform: translateY(-2px); }
        .btn-gold:active { transform: scale(0.97); background: linear-gradient(to right, #ffffff 0%, #fff2a3 60%, #ffcc00 100%); box-shadow: 0 0 25px #e6b800; }
        .btn-gold.loading { color: transparent; cursor: not-allowed; position: relative; }
        .btn-gold.loading::after {
            content: ""; position: absolute; width: 20px; height: 20px;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
            border: 3px solid transparent; border-top-color: #0d0d0d; border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Dynamic Real Response Message Status Styling */
        #api-response-msg { margin-top: 25px; padding: 15px; font-weight: 600; border-radius: 8px; border-left: 5px solid; display: none; text-align: left; }
        #api-response-msg.info { background: #1c1c1c; color: #e6b800; border-color: #e6b800; display: block; }
        #api-response-msg.error { background: #382424; color: #ff6347; border-color: #d32f2f; display: block; animation: shakeError 0.4s ease-in-out forwards; }

        /* Absolute Animated Success Modal Popup Layer */
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; animation: fadeIn 0.3s forwards; }
        .modal-box { background-color: #1a1a1a; border: 1px solid #e6b800; border-radius: 12px; padding: 30px; text-align: center; max-width: 400px; width: 85%; transform: scale(0.7); box-shadow: 0 0 20px rgba(230, 184, 0, 0.3); animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-sizing: border-box; }
        .success-checkmark { width: 60px; height: 60px; background-color: #2d5a27; color: #5cd65c; font-size: 2.2rem; line-height: 60px; border-radius: 50%; margin: 0 auto 15px auto; font-weight: bold; }

        /* Footer Portfolio View layout with Balanced Glow */
        footer { text-align: center; padding: 25px; color: #777777; font-size: 0.95rem; margin-top: auto; width: 100%; letter-spacing: 0.5px; line-height: 1.6; opacity: 0; transition: opacity 1.5s ease-in; }
        footer.visible { opacity: 1; }
        footer span { color: #e6b800; font-weight: 700; text-shadow: 0 0 12px rgba(230, 184, 0, 0.5); }
        footer .dept-label { display: block; font-size: 0.85rem; color: #555555; font-weight: 500; margin-top: 2px; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            header { padding: 25px 15px 5px 15px; } header h1 { font-size: 1.5rem; } header p { font-size: 0.85rem; }
            .section-box { padding: 25px 20px; } .section-title { font-size: 1.2rem; } footer { font-size: 0.85rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>VETIAS DOCUMENT & CERTIFICATES MANAGEMENT SYSTEM</h1>
        <p>FINAL YEAR PROJECT | Secure, Safe & Easy to Use</p>
    </header>

    <div class="container">

        <section id="step1-box" class="section-box">
            <h3 class="section-title">Programme & Semester Configuration</h3>
            <hr class="divider">
            
            <div class="form-group">
                <label>Select Programme / Course</label>
                <select id="dept-select">
                    <option value="">-- Choose Programme / Course --</option>
                    <option value="B.Sc. Computer Science">B.Sc. Computer Science</option>
                    <option value="B.Sc. Computer Science & Applications">B.Sc. Computer Science & Applications</option>
                    <option value="B.Sc. Computer Science (AI & Data Science)">B.Sc. Computer Science (AI & Data Science)</option>
                    <option value="B.Sc. Information Technology">B.Sc. Information Technology</option>
                    <option value="B.C.A.">B.C.A.</option>
                    <option value="B.Com.">B.Com.</option>
                    <option value="BBA">BBA</option>
                    <option value="B.A. English Literature">B.A. English Literature</option>
                    <option value="B.Sc. Costume Design and Fashion">B.Sc. Costume Design and Fashion</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Current Academic Year</label>
                <select id="year-select">
                    <option value="">-- Choose Academic Year --</option>
                    <option value="I Year">I Year</option>
                    <option value="II Year">II Year</option>
                    <option value="III Year">III Year</option>
                </select>
            </div>

            <button type="button" class="btn-gold" onclick="verifyAndGoToStep2()">Next Setup Interface</button>
        </section>

        <section id="step2-box" class="section-box hidden">
            <h3 class="section-title">Document or Certificate Upload Interface</h3>
            <p id="badge-info" style="color: #e6b800; font-size: 0.9rem; margin-top: -5px; margin-bottom: 15px; font-weight: 700; text-shadow: 0 0 5px rgba(230, 184, 0, 0.2);"></p>
            <hr class="divider">

            <form id="uploadForm" action="/api/upload-certificate" method="POST" enctype="multipart/form-data">
                
                <input type="hidden" id="hiddenDepartmentName" name="department_name">
                <input type="hidden" id="hiddenAcademicYear" name="academic_year">

                <div class="form-group">
                    <input type="text" id="studentName" name="student_name" placeholder="Student Name (e.g., Kishore S)" maxlength="40" required>
                </div>

                <div class="form-group">
                    <input type="text" id="certificateName" name="certificate_name" placeholder="Certificate Name (e.g., Java Basics)" maxlength="50" required>
                </div>

                <div class="form-group">
                    <input type="text" id="rollNumber" name="roll_number" placeholder="Roll Number (e.g., 24CSC16)" 
                           oninput="this.value = this.value.toUpperCase()" 
                           pattern="[0-9]{2}[A-Z0-9]+" 
                           title="Please enter a valid format (e.g., 24CSC16)" 
                           maxlength="15" required>
                </div>

                <div class="form-group">
                    <label style="color: #8c8c8c; font-size: 0.85rem;">Select Certificate File (.pdf, .jpg, .png)</label>
                    <input type="file" id="fileInput" name="certificate_file" accept=".pdf,.jpg,.png" style="display: none;" onchange="syncFileLabelText()">
                    <div class="file-upload-wrapper" id="custom-file-container" onclick="openFilePickerWindow()">
                        <span class="file-btn">Choose file</span>
                        <span id="file-custom-text" class="file-name-text">No file chosen</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-gold">Upload Document</button>
            </form>
            
            <div id="api-response-msg"></div>
        </section>

    </div>

    <div id="success-modal" class="modal-backdrop hidden">
        <div class="modal-box">
            <div class="success-checkmark">✓</div>
            <h3 style="color: #ffffff; margin-bottom: 8px;">Success State!</h3>
            <p id="success-dynamic-msg" style="color: #cccccc; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.4;"></p>
            <button class="btn-gold" onclick="closeSuccessReset()">OK</button>
        </div>
    </div>

    <footer id="footer">
        Maintained & Designed by: <span>KISHORE S</span>
        <span class="dept-label">III B.Sc. Computer Science</span>
    </footer>

    <script>
        // Check selection rules for Step 1 parameters
        function verifyAndGoToStep2() {
            var deptSelect = document.getElementById("dept-select");
            var yearSelect = document.getElementById("year-select");
            
            var selectedDept = deptSelect.value;
            var selectedYear = yearSelect.value;

            // Reset dynamic box colors back to original states on fresh click
            deptSelect.style.backgroundColor = "#262626";
            deptSelect.style.borderColor = "#444444";
            yearSelect.style.backgroundColor = "#262626";
            yearSelect.style.borderColor = "#444444";

            // ✨ NEW FULL BOX HIGHLIGHT COLOR INJECTION:
            if (!selectedDept) {
                alert("Validation Error: Please select a valid Programme / Course before proceeding!");
                deptSelect.style.backgroundColor = "#3d2424"; // Complete box changes to red tint shading look
                deptSelect.style.borderColor = "#ff4444";
                deptSelect.focus();
                return;
            }
            if (!selectedYear) {
                alert("Validation Error: Please select your Academic Year before proceeding!");
                yearSelect.style.backgroundColor = "#3d2424"; // Full background fill warning triggers
                yearSelect.style.borderColor = "#ff4444";
                yearSelect.focus();
                return;
            }

            document.getElementById("badge-info").innerText = "Target Path: " + selectedDept + " | " + selectedYear;
            
            // Sync values to form layers
            document.getElementById("hiddenDepartmentName").value = selectedDept;
            document.getElementById("hiddenAcademicYear").value = selectedYear;

            document.getElementById("step1-box").classList.add("hidden");
            document.getElementById("step2-box").classList.remove("hidden");
        }

        function openFilePickerWindow() { document.getElementById("fileInput").click(); }

        function syncFileLabelText() {
            var fileSelectorInput = document.getElementById("fileInput");
            var textLabelDisplay = document.getElementById("file-custom-text");
            if (fileSelectorInput.files.length > 0) {
                textLabelDisplay.innerText = fileSelectorInput.files[0].name;
                textLabelDisplay.style.color = "#ffffff";
            } else {
                textLabelDisplay.innerText = "No file chosen";
                textLabelDisplay.style.color = "#8c8c8c";
            }
        }

        // --- SERVER ENDPOINT NETWORK PIPELINE ---
        document.getElementById('uploadForm').addEventListener('submit', async function(event) {
            var fileField = document.getElementById("fileInput");
            if (fileField.files.length === 0) {
                event.preventDefault(); alert("Validation Error: Please select a valid file!"); return;
            }

            event.preventDefault(); 
            
            const formElement = event.target;
            const binaryMultipartData = new FormData(formElement);
            const statusBoxDisplay = document.getElementById('api-response-msg');
            const masterUploadButton = document.getElementById('submitBtn');
            const cacheOriginalText = masterUploadButton.innerHTML;
            
            const inputStudentName = document.getElementById("studentName").value.trim();
            const inputCertName = document.getElementById("certificateName").value.trim();
            
            masterUploadButton.disabled = true; masterUploadButton.classList.add('loading'); masterUploadButton.innerHTML = ''; 
            statusBoxDisplay.className = 'info'; statusBoxDisplay.textContent = 'Processing request secure upload...';

            try {
                const serverConnectionNetworkStream = await fetch(formElement.action, {
                    method: 'POST', body: binaryMultipartData
                });

                const rawServerOutputText = await serverConnectionNetworkStream.text();

                if (serverConnectionNetworkStream.ok) {
                    statusBoxDisplay.style.display = "none";
                    document.getElementById("success-dynamic-msg").innerHTML = "Hi <b>" + inputStudentName + "</b>, your <u>" + inputCertName + "</u> certificate verified and hosted successfully to secure multi-level Cloudinary folders layout.<br><br><small style='color:#8c8c8c;'>Server log: " + rawServerOutputText + "</small>";
                    document.getElementById("success-modal").classList.remove("hidden");
                } else {
                    statusBoxDisplay.className = 'error'; statusBoxDisplay.textContent = '❌ Upload Failed: ' + rawServerOutputText;
                }
            } catch (networkError) {
                statusBoxDisplay.className = 'error'; statusBoxDisplay.textContent = '❌ Network Connection Error: Unable to reach endpoint nodes.';
            } finally {
                masterUploadButton.disabled = false; masterUploadButton.classList.remove('loading'); masterUploadButton.innerHTML = cacheOriginalText; 
            }
        });

        function closeSuccessReset() {
            document.getElementById('uploadForm').reset();
            document.getElementById("dept-select").value = "";
            document.getElementById("year-select").value = "";
            document.getElementById("file-custom-text").innerText = "No file chosen";
            document.getElementById("file-custom-text").style.color = "#8c8c8c";
            document.getElementById("success-modal").classList.add("hidden");
            document.getElementById("step2-box").classList.add("hidden");
            document.getElementById("step1-box").classList.remove("hidden");
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.getElementById('footer').classList.add('visible'); }, 500); 
        });
    </script>
</body>
</html>
